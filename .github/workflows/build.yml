name: Build Ionic React App

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      # Example non-secret env vars (change to what your app needs)
      # Only vars prefixed with REACT_APP_ are exposed to the React build
      REACT_APP_API_URL: https://anfas3otor.com/backend/public/api/v1 
      # Example secret env var (set in GitHub repo Settings → Secrets and variables → Actions)
      # REACT_APP_API_KEY: ${{ secrets.REACT_APP_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ionic-react-build
          path: build
